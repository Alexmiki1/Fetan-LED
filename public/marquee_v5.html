<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}
.lane { overflow: hidden; width: 100%; padding: 6px 0; }
.inner {
  display: flex;
  white-space: nowrap;
  width: max-content;
}
.chunk {
  display: inline-block;
  padding-right: 8vw;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.01em;
  line-height: 1;
}
.r1 { font-size: 10vw; }
.r2 { font-size: 7.5vw; }
.w { color: #ffffff; }
.c { color: #59D1DC; }
</style>
</head>
<body>

<div class="lane">
  <div class="inner" id="row1">
    <span class="chunk r1"><span class="w">FETAN LED&nbsp;</span><span class="c">SCREEN</span></span>
    <span class="chunk r1"><span class="w">FETAN LED&nbsp;</span><span class="c">SCREEN</span></span>
    <span class="chunk r1"><span class="w">FETAN LED&nbsp;</span><span class="c">SCREEN</span></span>
    <span class="chunk r1"><span class="w">FETAN LED&nbsp;</span><span class="c">SCREEN</span></span>
  </div>
</div>

<div class="lane">
  <div class="inner" id="row2">
    <span class="chunk r2"><span class="c">SALES AND&nbsp;</span><span class="w">INSTALLATION</span></span>
    <span class="chunk r2"><span class="c">SALES AND&nbsp;</span><span class="w">INSTALLATION</span></span>
    <span class="chunk r2"><span class="c">SALES AND&nbsp;</span><span class="w">INSTALLATION</span></span>
    <span class="chunk r2"><span class="c">SALES AND&nbsp;</span><span class="w">INSTALLATION</span></span>
  </div>
</div>

<script>
  function marquee(el, speed) {
    const items = Array.from(el.children);
    const half = items.length / 2;
    const unitWidth = items.slice(0, half).reduce((s, n) => s + n.offsetWidth, 0);
    let pos = speed > 0 ? 0 : -unitWidth;

    function tick() {
      pos -= speed;
      if (speed > 0 && pos <= -unitWidth) pos += unitWidth;
      if (speed < 0 && pos >= 0)          pos -= unitWidth;
      el.style.transform = 'translateX(' + pos + 'px)';
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  window.addEventListener('load', function() {
    marquee(document.getElementById('row1'),  1.5);
    marquee(document.getElementById('row2'), -1.5);
  });
</script>

</body>
</html>
